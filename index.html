<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binjamin Homepage</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    color: white;
    overflow: hidden;
}

/* Background */
.slideshow {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -2;
}

.slideshow img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 2s ease-in-out;
}

.slideshow img.active {
    opacity: 1;
}

/* Overlay */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: -1;
}

/* Content */
.content {
    position: absolute;
    top: 15%;
    width: 100%;
    text-align: center;
}

/* Time */
.time {
    font-size: 4em;
    font-weight: 700;
    text-shadow: 0 0 10px rgba(0,0,0,0.7);
}

/* Date */
.date {
    margin-top: 5px;
    font-size: 1.2em;
    opacity: 0.9;
}

/* Search */
.search-box {
    margin-top: 25px;
    display: flex;
    justify-content: center;
}

.search-box input {
    width: 70%;
    max-width: 400px;
    padding: 12px 20px;
    border-radius: 30px;
    border: none;
    outline: none;
    font-size: 1em;
}

</style>
</head>

<body>

<!-- 🔥 তোমার নিজের ছবি -->
<div class="slideshow">
    <img src="photo1.jpg" class="active">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
</div>

<div class="overlay"></div>

<div class="content">
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>

    <form action="https://www.google.com/search" class="search-box">
        <input type="text" name="q" placeholder="Search Google...">
    </form>
</div>

<script>

/* Time + Seconds */
function updateTime() {
    let now = new Date();

    document.getElementById("time").innerText =
    now.toLocaleTimeString("en-US", {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: true
    });

    document.getElementById("date").innerText =
    now.toLocaleDateString("en-GB", {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    });
}

setInterval(updateTime, 1000);
updateTime();

/* Slideshow */
let index = 0;
let slides = document.querySelectorAll(".slideshow img");

function showSlides() {
    slides.forEach(img => img.classList.remove("active"));
    index++;
    if (index > slides.length) index = 1;
    slides[index - 1].classList.add("active");
    setTimeout(showSlides, 5000);
}
showSlides();

</script>

</body>
</html>
