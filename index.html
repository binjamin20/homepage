<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binjamin Homepage</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    color: white;
    overflow: hidden;
}

/* Background */
.slideshow {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -2;
}

.slideshow img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 2s ease-in-out;
}

.slideshow img.active {
    opacity: 1;
}

/* Overlay */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: -1;
}

/* Content */
.content {
    position: absolute;
    top: 8%;
    width: 100%;
    text-align: center;
}

/* Welcome */
.welcome {
    font-size: 1.5em;
    margin-bottom: 10px;
}

/* Time */
.time {
    font-size: 4em;
    font-weight: 700;
}

/* Date */
.date {
    font-size: 1.2em;
    margin-bottom: 20px;
}

/* 🔥 GLASS SEARCH BOX */
.search-box {
    display: flex;
    justify-content: center;
}

.search-box input {
    width: 70%;
    max-width: 420px;
    padding: 14px 20px;
    border-radius: 40px;

    /* 🔥 main magic */
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    font-size: 16px;
}

/* placeholder color */
.search-box input::placeholder {
    color: #ddd;
}

/* focus effect */
.search-box input:focus {
    border: 1px solid rgba(255,255,255,0.6);
}

</style>
</head>

<body>

<div class="slideshow">
    <img src="photo1.jpg" class="active">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
</div>

<div class="overlay"></div>

<div class="content">

<div class="welcome">Welcome, Binjamin</div>

<div class="time" id="time"></div>
<div class="date" id="date"></div>

<form action="https://www.google.com/search" class="search-box">
    <input type="text" name="q" placeholder="Search Google...                                   😘Binjamin🥰">
</form>

</div>

<script>
function updateTime() {
    let now = new Date();

    document.getElementById("time").innerText =
    now.toLocaleTimeString("en-US", {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
    });

    document.getElementById("date").innerText =
    now.toDateString();
}
setInterval(updateTime, 1000);
updateTime();

/* slideshow */
let index = 0;
let slides = document.querySelectorAll(".slideshow img");

function showSlides() {
    slides.forEach(img => img.classList.remove("active"));
    index++;
    if (index > slides.length) index = 1;
    slides[index - 1].classList.add("active");
    setTimeout(showSlides, 5000);
}
showSlides();
</script>

</body>
</html>
